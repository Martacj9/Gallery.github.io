<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Proyecto - Marta Crespo Jornet</title>
<style>
:root{
  --bg:#1B1E24;
  --header-bg:#17191e;
  --panel:#232730;
  --accent:#F29F05;
  --text:#F3F4F6;
  --muted:#C9CED6;
  --radius:14px;
  --transition:0.3s ease;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-top:80px;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:url('img/FondoWebGris.jpeg');
  background-repeat:repeat;
  opacity:0.2;
  z-index:-1;
}

header{
  position:fixed;
  top:0;left:0;width:100%;
  background:var(--header-bg);
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 36px;
  box-shadow:0 2px 12px rgba(0,0,0,0.6);
  z-index:1000;
}
header h1{font-size:1.6rem;color:var(--accent);font-weight:600}
.header-left{display:flex;align-items:center;gap:12px}
nav{display:flex;align-items:center;gap:18px}
.social-icons{display:flex;align-items:center;gap:10px}
.social-icons a{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:50%;
  overflow:hidden;background:rgba(255,255,255,0.05);
  transition:transform .25s ease, background .25s ease, filter .25s ease;
}
.social-icons a:hover{
  background:rgba(255,255,255,0.05);
  transform:scale(1.1);
  filter:brightness(0) saturate(100%) invert(64%) sepia(78%) saturate(1140%) hue-rotate(2deg) brightness(101%) contrast(103%);
}
.social-icons img{width:30px;height:30px;filter:brightness(0) invert(1)}
.nav-link{
  background:none;border:0;color:var(--muted);font:inherit;
  cursor:pointer;padding:8px 12px;border-radius:10px;
  transition:background var(--transition),color var(--transition);
  text-decoration:none;
}
.nav-link:hover,.nav-link.active{background:var(--accent);color:#fff}
.cv-button,.external-button{
  background:var(--accent);color:#fff;border:none;font-weight:600;
  padding:8px 14px;border-radius:10px;cursor:pointer;
  transition:background var(--transition),transform var(--transition);
  text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.cv-button:hover,.external-button:hover{background:#c98304;transform:translateY(-2px)}
.menu-toggle{display:none;background:none;border:0;color:var(--accent);font-size:2rem;cursor:pointer}

main{
  width:100%;
  max-width:1160px;
  margin:0 auto;
  padding:34px 22px 58px;
}
.back-link{
  color:var(--muted);
  text-decoration:none;
  display:inline-flex;
  margin-bottom:18px;
  padding:8px 0;
}
.back-link:hover{color:var(--accent)}
.project-hero{
  display:grid;
  grid-template-columns:minmax(0,1.2fr) minmax(280px,.8fr);
  gap:28px;
  align-items:center;
  margin-bottom:36px;
}
.hero-media{
  background:#0f1115;
  border-radius:var(--radius);
  overflow:hidden;
  min-height:320px;
  box-shadow:0 12px 34px rgba(0,0,0,.45);
}
.hero-media img{
  width:100%;
  height:100%;
  min-height:320px;
  object-fit:cover;
  display:block;
}
.hero-copy h2{
  color:var(--accent);
  font-size:clamp(2rem,5vw,4.2rem);
  line-height:1.02;
  margin-bottom:14px;
}
.hero-copy p{
  color:var(--text);
  font-size:1.08rem;
  line-height:1.7;
  opacity:.92;
  margin-bottom:18px;
}
.project-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.tag{
  background:rgba(242,159,5,.14);
  border:1px solid rgba(242,159,5,.35);
  color:var(--accent);
  font-size:.86rem;
  padding:5px 9px;
  border-radius:8px;
}
.external-actions{display:flex;flex-wrap:wrap;gap:10px}

.media-section{
  display:grid;
  grid-template-columns:56px minmax(0,1fr) 56px;
  gap:18px;
  align-items:center;
  margin:22px 0 34px;
}
.media-frame{
  background:#0f1115;
  border-radius:var(--radius);
  min-height:420px;
  overflow:hidden;
  box-shadow:0 10px 28px rgba(0,0,0,.4);
}
.media-frame img,.media-frame iframe{
  width:100%;
  height:420px;
  display:block;
  border:0;
  object-fit:cover;
}
.media-button{
  width:56px;height:56px;border:0;border-radius:50%;
  color:#fff;background:rgba(255,255,255,.16);
  font-size:2rem;cursor:pointer;
  transition:background var(--transition), transform var(--transition);
}
.media-button:hover{background:var(--accent);transform:scale(1.05)}
.media-dots{display:flex;justify-content:center;gap:8px;margin-top:14px}
.media-dots button{
  width:9px;height:9px;border:0;border-radius:50%;
  background:rgba(255,255,255,.28);cursor:pointer;
}
.media-dots button.active{background:var(--accent)}

.content-grid{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(260px,.35fr);
  gap:30px;
  align-items:start;
}
.text-panel,.info-panel{
  background:var(--panel);
  border-radius:var(--radius);
  padding:26px;
  box-shadow:0 8px 22px rgba(0,0,0,.35);
}
.text-panel h3,.info-panel h3{
  color:var(--accent);
  font-size:1.45rem;
  margin-bottom:16px;
}
.text-panel p{
  line-height:1.75;
  color:var(--text);
  opacity:.92;
  margin-bottom:16px;
}
.contributions{
  list-style:none;
  display:grid;
  gap:12px;
}
.contributions li{
  line-height:1.6;
  padding-left:18px;
  position:relative;
}
.contributions li::before{
  content:"";
  position:absolute;
  left:0;top:.72em;
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);
}
.info-list{display:grid;gap:12px}
.info-list div{
  display:flex;
  justify-content:space-between;
  gap:18px;
  border-bottom:1px solid rgba(255,255,255,.08);
  padding-bottom:10px;
}
.info-list dt{color:var(--muted)}
.info-list dd{text-align:right;color:var(--text);font-weight:600}
footer{text-align:center;font-size:.9rem;opacity:.7;padding:28px 0;border-top:1px solid rgba(255,255,255,.04)}

@media (max-width:900px){
  .project-hero,.content-grid{grid-template-columns:1fr}
  .media-section{grid-template-columns:44px minmax(0,1fr) 44px;gap:10px}
  .media-button{width:44px;height:44px;font-size:1.6rem}
}
@media (max-width:768px){
  header{flex-wrap:wrap;padding:14px 20px}
  nav{display:none;flex-direction:column;width:100%;background:var(--header-bg);border-top:1px solid rgba(255,255,255,.1);padding-top:10px}
  nav.show{display:flex}
  .menu-toggle{display:block}
  .nav-link,.cv-button{width:100%;text-align:center}
  main{padding:28px 16px 48px}
  .hero-media,.hero-media img{min-height:230px}
  .media-frame{min-height:260px}
  .media-frame img,.media-frame iframe{height:260px}
}
</style>
</head>

let currentMedia = 0;
const lang = localStorage.getItem("selectedLang") || "es";
const params = new URLSearchParams(window.location.search);
const projectKey = params.get("p") || "underpacked";
const project = projects[projectKey] || projects.underpacked;

function text(value){
  return typeof value === "string" ? value : (value[lang] || value.es);
}

function renderProject(){
  document.title = project.title + " - Marta Crespo Jornet";
  document.getElementById("project-title").textContent = project.title;
  document.getElementById("hero-image").src = project.cover;
  document.getElementById("hero-image").alt = project.title;
  document.getElementById("project-summary").textContent = text(project.summary);
  document.getElementById("project-tags").innerHTML = project.tags.map(tag => `<span class="tag">${tag}</span>`).join("");
  document.getElementById("external-actions").innerHTML = project.actions.map(action => `<a class="external-button" href="${action.url}" target="_blank" rel="noopener">${action.label}</a>`).join("");
  document.getElementById("project-description").innerHTML = text(project.description).map(paragraph => `<p>${paragraph}</p>`).join("");
  document.getElementById("project-contributions").innerHTML = text(project.contributions).map(item => `<li>${item}</li>`).join("");
  document.getElementById("project-details").innerHTML = `
    <div><dt>Engine</dt><dd>${project.details.engine}</dd></div>
    <div><dt>Role</dt><dd>${project.details.role}</dd></div>
    <div><dt>Status</dt><dd>${project.details.status}</dd></div>
    <div><dt>Platform</dt><dd>${project.details.platform}</dd></div>
  `;
  if(lang === "en"){
    document.getElementById("nav-home").textContent = "Home";
    document.getElementById("nav-about").textContent = "About me";
    document.getElementById("nav-skills").textContent = "Skills";
    document.getElementById("nav-projects").textContent = "Projects";
    document.getElementById("back-link").textContent = "< Back to projects";
    document.getElementById("about-heading").textContent = "About the project";
    document.getElementById("contribution-heading").textContent = "My contribution";
    document.getElementById("details-heading").textContent = "Details";
  }
  renderMedia();
}

function renderMedia(){
  const media = project.media[currentMedia];
  const frame = document.getElementById("media-frame");
  if(media.type === "video"){
    frame.innerHTML = `<iframe src="${media.src}" title="${media.title || project.title}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
  } else {
    frame.innerHTML = `<img src="${media.src}" alt="${media.alt || project.title}">`;
  }
  document.getElementById("media-dots").innerHTML = project.media.map((_, index) => `<button class="${index === currentMedia ? "active" : ""}" aria-label="Ver medio ${index + 1}" data-index="${index}"></button>`).join("");
  document.querySelectorAll("#media-dots button").forEach(button => {
    button.addEventListener("click", () => {
      currentMedia = Number(button.dataset.index);
      renderMedia();
    });
  });
}

document.getElementById("prev-media").addEventListener("click", () => {
  currentMedia = (currentMedia - 1 + project.media.length) % project.media.length;
  renderMedia();
});
document.getElementById("next-media").addEventListener("click", () => {
  currentMedia = (currentMedia + 1) % project.media.length;
  renderMedia();
});
document.getElementById("menu-toggle").addEventListener("click", () => {
  document.querySelector("nav").classList.toggle("show");
});
document.getElementById("year").textContent = new Date().getFullYear();
renderProject();
</script>
</body>
</html>
