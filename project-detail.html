<style>
:root{
  --bg:#1B1E24;
  --header-bg:#17191e;
  --panel:#232730;
  --accent:#F29F05;
  --text:#F3F4F6;
  --muted:#C9CED6;
  --radius:14px;
  --transition:0.3s ease;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-top:80px;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:url('img/FondoWebGris.jpeg');
  background-repeat:repeat;
  opacity:0.2;
  z-index:-1;
}

header{
  position:fixed;
  top:0;left:0;width:100%;
  background:var(--header-bg);
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 36px;
  box-shadow:0 2px 12px rgba(0,0,0,0.6);
  z-index:1000;
}
header h1{font-size:1.6rem;color:var(--accent);font-weight:600}
.header-left{display:flex;align-items:center;gap:12px}
.header-right{display:flex;align-items:center;justify-content:flex-end;gap:10px}
nav{display:flex;align-items:center;gap:18px}
.social-icons{display:flex;align-items:center;gap:10px}
.social-icons a{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:50%;
  overflow:hidden;background:rgba(255,255,255,0.05);
  transition:transform .25s ease, background .25s ease;
}
.social-icons a:hover{background:var(--accent);transform:scale(1.1)}
.social-icons img{width:30px;height:30px;filter:brightness(0) invert(1)}
.nav-link{
  background:none;border:0;color:var(--muted);font:inherit;
  cursor:pointer;padding:8px 12px;border-radius:10px;
  transition:background var(--transition),color var(--transition);
  text-decoration:none;
}
.nav-link:hover{background:var(--accent);color:#fff}
.nav-item{position:relative}
.dropdown{
  position:absolute;
  top:calc(100% + 6px);
  right:0;
  background:var(--panel);
  border-radius:var(--radius);
  box-shadow:0 8px 22px rgba(0,0,0,.45);
  display:none;
  flex-direction:column;
  min-width:180px;
  z-index:1001;
  opacity:0;
  transform:translateY(-8px);
  transition:opacity .25s ease, transform .25s ease;
}
.dropdown.show{
  display:flex;
  opacity:1;
  transform:translateY(0);
}
.dropdown a,.dropdown button{
  color:var(--text);
  text-decoration:none;
  background:none;
  border:none;
  text-align:left;
  padding:10px 14px;
  cursor:pointer;
  font:inherit;
  width:100%;
}
.dropdown a:hover,.dropdown button:hover{background:var(--accent);color:#fff}
.cv-button{
  background:var(--accent);color:#fff;border:none;font-weight:600;
  padding:8px 14px;border-radius:10px;cursor:pointer;
  transition:background var(--transition),transform var(--transition);
  text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;
}
.cv-button:hover{background:#c98304;transform:translateY(-2px)}
.menu-toggle{display:none;background:none;border:0;color:var(--accent);font-size:2rem;cursor:pointer}

main{
  width:100%;
  max-width:980px;
  margin:0 auto;
  padding:34px 22px 58px;
}
.back-link{
  color:var(--muted);
  text-decoration:none;
  display:inline-flex;
  margin-bottom:18px;
  padding:8px 0;
}
.back-link:hover{color:var(--accent)}
.project-hero{
  text-align:center;
  margin-bottom:18px;
}
.hero-copy h2{
  color:var(--accent);
  font-size:clamp(2rem,5vw,3.3rem);
  line-height:1.08;
  margin-bottom:12px;
}
.hero-copy p{
  color:var(--text);
  font-size:1.08rem;
  line-height:1.7;
  opacity:.92;
  max-width:620px;
  margin:0 auto 18px;
  font-style:italic;
}
.project-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:12px auto 22px}
.tag{
  background:rgba(242,159,5,.14);
  border:1px solid rgba(242,159,5,.35);
  color:var(--accent);
  font-size:.86rem;
  padding:5px 9px;
  border-radius:8px;
}
.external-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin:22px 0}
.external-button{
  width:58px;
  height:58px;
  border-radius:50%;
  background:#05070a;
  border:1px solid rgba(255,255,255,.16);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  box-shadow:0 8px 18px rgba(0,0,0,.35);
  transition:transform var(--transition), box-shadow var(--transition), background var(--transition);
}
.external-button:hover{
  background:#000;
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 0 18px rgba(242,159,5,.45);
}
.external-button img{
  width:34px;
  height:34px;
  display:block;
  object-fit:contain;
  filter:brightness(0) invert(1);
}
.external-button span{
  color:#fff;
  font-weight:700;
  font-size:.72rem;
  letter-spacing:0;
}

.media-section{
  display:grid;
  grid-template-columns:56px minmax(0,1fr) 56px;
  gap:18px;
  align-items:center;
  margin:8px 0 28px;
}
.media-frame{
  background:#0f1115;
  border-radius:var(--radius);
  min-height:360px;
  overflow:hidden;
  box-shadow:0 10px 28px rgba(0,0,0,.4);
}
.media-frame img,.media-frame iframe{
  width:100%;
  height:360px;
  display:block;
  border:0;
  object-fit:cover;
}
.media-button{
  width:56px;height:56px;border:0;border-radius:50%;
  color:#fff;background:rgba(255,255,255,.16);
  font-size:2rem;cursor:pointer;
  transition:background var(--transition), transform var(--transition);
}
.media-button:hover{background:var(--accent);transform:scale(1.05)}
.media-dots{display:flex;justify-content:center;gap:8px;margin-top:14px}
.media-dots button{
  width:9px;height:9px;border:0;border-radius:50%;
  background:rgba(255,255,255,.28);cursor:pointer;
}
.media-dots button.active{background:var(--accent)}

.content-grid{
  display:block;
  max-width:760px;
  margin:0 auto;
}
.text-panel,.info-panel{
  background:transparent;
  border-radius:0;
  padding:10px 0 0;
  box-shadow:none;
}
.text-panel h3,.info-panel h3{
  color:var(--accent);
  font-size:1.45rem;
  margin:34px 0 18px;
  text-align:center;
}
.text-panel p{
  line-height:1.75;
  color:var(--text);
  opacity:.92;
  margin-bottom:16px;
  text-align:left;
}
.contributions{
  list-style:disc;
  display:grid;
  gap:10px;
  padding-left:22px;
}
.contributions li{
  line-height:1.6;
  padding-left:2px;
  position:relative;
}
.contributions li::marker{color:var(--accent)}
.info-panel{margin-top:22px}
.info-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}
.info-list div{
  background:var(--panel);
  border:1px solid rgba(242,159,5,.18);
  border-radius:10px;
  padding:12px;
}
.info-list dt{color:var(--muted)}
.info-list dd{color:var(--text);font-weight:600;margin-top:4px}
footer{text-align:center;font-size:.9rem;opacity:.7;padding:28px 0;border-top:1px solid rgba(255,255,255,.04)}

@media (max-width:900px){
  .media-section{grid-template-columns:44px minmax(0,1fr) 44px;gap:10px}
  .media-button{width:44px;height:44px;font-size:1.6rem}
}
@media (max-width:768px){
  header{flex-wrap:wrap;padding:14px 20px}
  nav{display:none;flex-direction:column;width:100%;background:var(--header-bg);border-top:1px solid rgba(255,255,255,.1);padding-top:10px}
  nav.show{display:flex}
  .menu-toggle{display:block}
  .nav-link,.cv-button{width:100%;text-align:center}
  main{padding:28px 16px 48px}
  .media-frame{min-height:260px}
  .media-frame img,.media-frame iframe{height:260px}
}
</style>

    contributions: { es: ["Implementacion de flujo y escenas.", "Integracion de contenido educativo.", "Apoyo en pruebas y presentacion."], en: ["Flow and scene implementation.", "Educational content integration.", "Testing and presentation support."] },
    tags: ["Unity", "Newsgame", "Educational"],
    details: { engine: "Unity", role: "Game developer", status: "Published", platform: "Itch.io" },
    actions: [{ label: "Itch.io", url: "https://cokirmg.itch.io/works-right-right", icon: "img/itchioLogo.png" }],
    media: [{ type: "image", src: "img/PortadaWorkRightsRight.jpeg", alt: "Works rights, right...?" }]
  }
};

let currentMedia = 0;
let lang = localStorage.getItem("selectedLang") || "es";
const params = new URLSearchParams(window.location.search);
const projectKey = params.get("p") || "underpacked";
const project = projects[projectKey] || projects.underpacked;
const pageTexts = {
  es: {
    navAbout: "Sobre mi",
    navSkills: "Habilidades",
    projectsBtn: "Proyectos ▾",
    dropdownAll: "Ver todos",
    langBtn: "🌐 Idioma ▾",
    back: "← Volver a proyectos",
    aboutHeading: "Sobre el proyecto",
    contributionHeading: "Mi contribucion",
    detailsHeading: "Detalles",
    detailLabels: { engine: "Motor", role: "Rol", status: "Estado", platform: "Plataforma" }
  },
  en: {
    navAbout: "About Me",
    navSkills: "Skills",
    projectsBtn: "Projects ▾",
    dropdownAll: "View all",
    langBtn: "🌐 Language ▾",
    back: "← Back to projects",
    aboutHeading: "About the project",
    contributionHeading: "My contribution",
    detailsHeading: "Details",
    detailLabels: { engine: "Engine", role: "Role", status: "Status", platform: "Platform" }
  }
};

function text(value){
  return typeof value === "string" ? value : (value[lang] || value.es);
}

function renderProject(){
  const t = pageTexts[lang] || pageTexts.es;
  document.title = project.title + " - Marta Crespo Jornet";
  document.getElementById("project-title").textContent = project.title;
  document.getElementById("project-summary").textContent = text(project.summary);
  document.getElementById("project-tags").innerHTML = project.tags.map(tag => `<span class="tag">${tag}</span>`).join("");
  document.getElementById("external-actions").innerHTML = project.actions.map(action => {
    const icon = action.icon ? `<img src="${action.icon}" alt="">` : `<span>${action.label.slice(0, 2)}</span>`;
    return `<a class="external-button" href="${action.url}" target="_blank" rel="noopener" aria-label="${action.label}" title="${action.label}">${icon}</a>`;
  }).join("");
  document.getElementById("project-description").innerHTML = text(project.description).map(paragraph => `<p>${paragraph}</p>`).join("");
  document.getElementById("project-contributions").innerHTML = text(project.contributions).map(item => `<li>${item}</li>`).join("");
  document.getElementById("project-details").innerHTML = `
    <div><dt>${t.detailLabels.engine}</dt><dd>${project.details.engine}</dd></div>
    <div><dt>${t.detailLabels.role}</dt><dd>${project.details.role}</dd></div>
    <div><dt>${t.detailLabels.status}</dt><dd>${project.details.status}</dd></div>
    <div><dt>${t.detailLabels.platform}</dt><dd>${project.details.platform}</dd></div>
  `;
  document.getElementById("nav-about").textContent = t.navAbout;
  document.getElementById("nav-skills").textContent = t.navSkills;
  document.getElementById("projects-btn").textContent = t.projectsBtn;
  document.getElementById("dropdown-all").textContent = t.dropdownAll;
  document.getElementById("lang-btn").textContent = t.langBtn;
  document.getElementById("back-link").textContent = t.back;
  document.getElementById("about-heading").textContent = t.aboutHeading;
  document.getElementById("contribution-heading").textContent = t.contributionHeading;
  document.getElementById("details-heading").textContent = t.detailsHeading;
  renderMedia();
}

function renderMedia(){
  const media = project.media[currentMedia];
  const frame = document.getElementById("media-frame");
  if(media.type === "video"){
    frame.innerHTML = `<iframe src="${media.src}" title="${media.title || project.title}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
  } else {
    frame.innerHTML = `<img src="${media.src}" alt="${media.alt || project.title}">`;
  }
  document.getElementById("media-dots").innerHTML = project.media.map((_, index) => `<button class="${index === currentMedia ? "active" : ""}" aria-label="Ver medio ${index + 1}" data-index="${index}"></button>`).join("");
  document.querySelectorAll("#media-dots button").forEach(button => {
    button.addEventListener("click", () => {
      currentMedia = Number(button.dataset.index);
      renderMedia();
    });
  });
}

document.getElementById("prev-media").addEventListener("click", () => {
  currentMedia = (currentMedia - 1 + project.media.length) % project.media.length;
  renderMedia();
});
document.getElementById("next-media").addEventListener("click", () => {
  currentMedia = (currentMedia + 1) % project.media.length;
  renderMedia();
});
document.getElementById("menu-toggle").addEventListener("click", () => {
  document.querySelector("nav").classList.toggle("show");
  closeDropdowns();
});

const projectsBtn = document.getElementById("projects-btn");
const projectsDropdown = document.getElementById("projects-dropdown");
const langBtn = document.getElementById("lang-btn");
const langDropdown = document.getElementById("lang-dropdown");

function closeDropdowns(){
  projectsDropdown.classList.remove("show");
  projectsBtn.setAttribute("aria-expanded", "false");
  langDropdown.classList.remove("show");
  langBtn.setAttribute("aria-expanded", "false");
}

projectsBtn.addEventListener("click", (event) => {
  event.stopPropagation();
  const isOpen = projectsDropdown.classList.contains("show");
  closeDropdowns();
  if(!isOpen){
    projectsDropdown.classList.add("show");
    projectsBtn.setAttribute("aria-expanded", "true");
  }
});

langBtn.addEventListener("click", (event) => {
  event.stopPropagation();
  const isOpen = langDropdown.classList.contains("show");
  closeDropdowns();
  if(!isOpen){
    langDropdown.classList.add("show");
    langBtn.setAttribute("aria-expanded", "true");
  }
});
document.querySelectorAll("#lang-dropdown button").forEach((button) => {
  button.addEventListener("click", () => {
    lang = button.dataset.lang;
    localStorage.setItem("selectedLang", lang);
    closeDropdowns();
    renderProject();
  });
});
document.addEventListener("click", () => {
  closeDropdowns();
});
document.querySelector("nav").addEventListener("click", (event) => {
  event.stopPropagation();
});
document.getElementById("year").textContent = new Date().getFullYear();
renderProject();
</script>
</body>
</html>
